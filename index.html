<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue:    #1a73e8;
  --blue-lt: #e8f0fe;
  --red:     #d93025;
  --gray-1:  #f8f9fa;
  --gray-2:  #f1f3f4;
  --gray-3:  #e0e0e0;
  --gray-4:  #9aa0a6;
  --gray-5:  #5f6368;
  --text:    #202124;
  --white:   #ffffff;
  --shadow:  0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
  --radius:  10px;
  --transition: 0.18s ease;
}

body {
  background: var(--gray-1);
  min-height: 100vh;
  font-family: 'Segoe UI', system-ui, sans-serif;
  color: var(--text);
  -webkit-tap-highlight-color: transparent;
  display: flex;
  flex-direction: column;
}

/* ===== LOGIN ===== */
#loginPage {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: linear-gradient(135deg, #e8f0fe 0%, #f8f9fa 60%);
}
#loginPage.hidden { display: none; }

.login-card {
  width: 100%;
  max-width: 360px;
  background: var(--white);
  padding: 44px 36px;
  border-radius: 16px;
  box-shadow: var(--shadow-lg);
}
.login-logo {
  text-align: center;
  margin-bottom: 28px;
}
.login-logo span {
  display: inline-block;
  background: var(--blue);
  color: #fff;
  font-size: 28px;
  width: 56px; height: 56px;
  border-radius: 14px;
  line-height: 56px;
  margin-bottom: 12px;
}
.login-logo h2 { font-size: 18px; font-weight: 600; color: var(--text); }
.login-logo p  { font-size: 13px; color: var(--gray-4); margin-top: 4px; }

.field {
  position: relative;
  margin: 16px 0;
}
.field input {
  width: 100%;
  padding: 13px 14px;
  border: 1.5px solid var(--gray-3);
  border-radius: 8px;
  font-size: 15px;
  outline: none;
  transition: border-color var(--transition);
  background: var(--gray-1);
}
.field input:focus { border-color: var(--blue); background: var(--white); }

.btn-primary {
  width: 100%;
  padding: 13px;
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;
  transition: opacity var(--transition), transform var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-primary:hover  { opacity: 0.9; transform: translateY(-1px); }
.btn-primary:active { opacity: 1;   transform: translateY(0); }
.btn-primary:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

.err-msg {
  color: var(--red);
  font-size: 13px;
  margin-top: 10px;
  text-align: center;
  display: none;
}

/* ===== TOPBAR ===== */
.topbar {
  background: var(--white);
  border-bottom: 1px solid var(--gray-3);
  padding: 0 20px;
  height: 56px;
  display: none;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}
.topbar-brand { font-weight: 700; font-size: 15px; color: var(--text); display: flex; align-items: center; gap: 8px; }
.topbar-brand span { color: var(--blue); font-size: 20px; }
.btn-exit {
  border: none;
  background: none;
  color: var(--gray-5);
  cursor: pointer;
  font-size: 13px;
  padding: 6px 10px;
  border-radius: 6px;
  transition: background var(--transition);
}
.btn-exit:hover { background: var(--gray-2); }

/* ===== MAIN PAGE ===== */
#mainPage { display: none; padding: 20px; }
#mainPage.active { display: block; }
.main { max-width: 860px; margin: 0 auto; }

/* ===== BREADCRUMB ===== */
.breadcrumb {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 4px;
  font-size: 13px;
  color: var(--blue);
  margin-bottom: 16px;
  min-height: 22px;
}
.bc-sep { color: var(--gray-4); }
.bc-item { cursor: pointer; transition: opacity var(--transition); }
.bc-item:hover { opacity: 0.7; text-decoration: underline; }

/* ===== TOOLBAR ===== */
.toolbar {
  display: flex;
  gap: 10px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.btn-secondary {
  padding: 9px 16px;
  background: var(--white);
  color: var(--text);
  border: 1.5px solid var(--gray-3);
  border-radius: 8px;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
.btn-secondary:hover { background: var(--gray-2); border-color: var(--blue); color: var(--blue); }
.btn-upload {
  padding: 9px 16px;
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn-upload:hover { opacity: 0.88; }

/* ===== REFRESH BTN ===== */
.btn-refresh {
  padding: 9px 12px;
  background: var(--white);
  color: var(--gray-5);
  border: 1.5px solid var(--gray-3);
  border-radius: 8px;
  font-size: 15px;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  line-height: 1;
}
.btn-refresh:hover { background: var(--gray-2); color: var(--blue); border-color: var(--blue); }
.btn-refresh.spinning { animation: spin 0.7s linear infinite; pointer-events: none; }

/* ===== DROP ZONE ===== */
.dropzone {
  background: var(--white);
  border: 2px dashed var(--gray-3);
  padding: 28px;
  text-align: center;
  border-radius: var(--radius);
  cursor: pointer;
  margin-bottom: 14px;
  transition: all var(--transition);
  color: var(--gray-5);
  font-size: 14px;
}
.dropzone:hover, .dropzone.drag {
  border-color: var(--blue);
  background: var(--blue-lt);
  color: var(--blue);
}

/* ===== FILE LIST ===== */
.list-wrap {
  background: var(--white);
  border: 1px solid var(--gray-3);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
}

.list-header {
  padding: 10px 16px;
  background: var(--gray-1);
  border-bottom: 1px solid var(--gray-3);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--gray-4);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.row {
  display: flex;
  align-items: center;
  padding: 11px 15px;
  border-bottom: 1px solid #f5f5f5;
  min-height: 62px;
  transition: background var(--transition);
  position: relative;
}
.row:last-child { border-bottom: none; }
.row.folder-row { cursor: pointer; }
.row.folder-row:hover, .row:hover { background: var(--blue-lt); }
.row.optimistic { opacity: 0.5; pointer-events: none; }
.row.removing {
  animation: fadeOut 0.25s ease forwards;
}

@keyframes fadeOut {
  to { opacity: 0; max-height: 0; padding: 0; overflow: hidden; }
}

.row-icon { font-size: 22px; flex-shrink: 0; }
.row-info { flex: 1; min-width: 0; padding: 0 10px; }
.row-name { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row-meta { font-size: 11px; color: var(--gray-4); margin-top: 2px; }

.row-actions { display: flex; gap: 5px; flex-shrink: 0; }
.act {
  display: flex;
  align-items: center;
  padding: 7px 8px;
  border: 1px solid var(--gray-3);
  border-radius: 7px;
  background: var(--white);
  cursor: pointer;
  transition: all var(--transition);
  font-size: 14px;
  gap: 0;
  overflow: hidden;
  max-width: 34px;
  white-space: nowrap;
}
.act-label { opacity: 0; width: 0; font-size: 11px; font-weight: 600; transition: all var(--transition); }
@media (hover: hover) {
  .act:hover { max-width: 130px; padding-right: 11px; gap: 5px; background: var(--gray-2); border-color: var(--blue); }
  .act:hover .act-label { opacity: 1; width: auto; color: var(--blue); }
}

.empty-state {
  padding: 48px 20px;
  text-align: center;
  color: var(--gray-4);
  font-size: 14px;
}
.empty-state div { font-size: 36px; margin-bottom: 10px; }

/* ===== UPLOAD PANEL ===== */
#upPanel { position: fixed; bottom: 20px; right: 20px; width: 290px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
.up-card {
  background: var(--white);
  padding: 12px 14px;
  border-radius: 10px;
  box-shadow: var(--shadow-lg);
  border-left: 3px solid var(--blue);
  animation: slideIn 0.2s ease;
}
@keyframes slideIn { from { opacity: 0; transform: translateY(10px); } }
.up-filename { font-size: 12px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.up-status { font-size: 11px; color: var(--gray-4); display: flex; justify-content: space-between; margin-top: 3px; }
.up-bar { height: 3px; background: var(--gray-3); border-radius: 2px; margin-top: 8px; overflow: hidden; }
.up-fill { height: 100%; background: var(--blue); border-radius: 2px; transition: width 0.3s ease; }

/* ===== PREVIEW OVERLAY ===== */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 999;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(2px);
}
.overlay.active { display: flex; }
.preview-win {
  background: var(--white);
  width: 90%;
  max-width: 760px;
  height: 75vh;
  border-radius: 14px;
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  overflow: hidden;
  animation: zoomIn 0.2s ease;
}
@keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } }
.preview-nav {
  background: var(--white);
  padding: 12px 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--gray-3);
}
.preview-title { font-size: 13px; font-weight: 600; max-width: 65%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.btn-close {
  background: var(--red);
  color: #fff;
  border: none;
  padding: 7px 14px;
  border-radius: 6px;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
}
.preview-body {
  flex: 1;
  background: var(--gray-2);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.preview-body iframe, .preview-body img { width: 100%; height: 100%; border: none; object-fit: contain; display: block; }
.preview-loader { font-size: 13px; color: var(--gray-4); }

/* ===== MODALS ===== */
.modal-bg {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 500;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(1px);
}
.modal-bg.active { display: flex; }
.modal {
  background: var(--white);
  padding: 28px;
  border-radius: 14px;
  width: 90%;
  max-width: 420px;
  box-shadow: var(--shadow-lg);
  animation: slideUp 0.2s ease;
}
@keyframes slideUp { from { opacity: 0; transform: translateY(16px); } }
.modal h3 { font-size: 16px; margin-bottom: 16px; }
.modal input, .modal select {
  width: 100%;
  padding: 11px 13px;
  border: 1.5px solid var(--gray-3);
  border-radius: 8px;
  font-size: 14px;
  outline: none;
  margin-bottom: 14px;
  transition: border-color var(--transition);
}
.modal input:focus, .modal select:focus { border-color: var(--blue); }
.modal-actions { display: flex; gap: 10px; }
.modal-actions .btn-primary { flex: 1; }
.btn-cancel {
  flex: 1;
  padding: 11px;
  background: var(--gray-2);
  color: var(--text);
  border: none;
  border-radius: 8px;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: background var(--transition);
}
.btn-cancel:hover { background: var(--gray-3); }
.conf-text { font-size: 13px; color: var(--gray-5); margin-bottom: 20px; white-space: pre-wrap; line-height: 1.6; }

/* ===== SPINNER ===== */
.spinner { display: inline-block; width: 16px; height: 16px; border: 2.5px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== CACHE BADGE ===== */
.cache-badge {
  font-size: 10px;
  background: #fef9c3;
  color: #854d0e;
  border: 1px solid #fde68a;
  padding: 2px 7px;
  border-radius: 20px;
  font-weight: 600;
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar" id="topbar">
  <div class="topbar-brand"><span>📂</span> Bando Sardegna</div>
  <button class="btn-exit" onclick="logout()">Esci</button>
</div>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-card">
    <div class="login-logo">
      <span>🗂️</span>
      <h2>Portale Bando Sardegna</h2>
      <p>Accedi per gestire i tuoi documenti</p>
    </div>
    <div class="field">
      <input type="password" id="pwd" placeholder="Password" onkeydown="if(event.key==='Enter')login()"/>
    </div>
    <button class="btn-primary" id="loginBtn" onclick="login()">Accedi</button>
    <p class="err-msg" id="loginErr">Password errata. Riprova.</p>
  </div>
</div>

<!-- MAIN -->
<div class="page" id="mainPage">
  <div class="main">
    <div id="bc" class="breadcrumb"></div>

    <div class="toolbar">
      <button class="btn-secondary" onclick="showM('folderM')">📁 Nuova Cartella</button>
      <button class="btn-upload" onclick="document.getElementById('fin').click()">📤 Carica File</button>
      <button class="btn-refresh" id="refreshBtn" onclick="refreshCurrent()" title="Aggiorna">↻</button>
    </div>

    <div class="dropzone" id="dz"
      onclick="document.getElementById('fin').click()"
      ondrop="onDrop(event)"
      ondragover="event.preventDefault();this.classList.add('drag')"
      ondragleave="this.classList.remove('drag')">
      📎 Trascina qui i file oppure clicca per selezionarli
    </div>
    <input type="file" id="fin" multiple style="display:none" onchange="handleFiles(this.files)"/>

    <div class="list-wrap">
      <div class="list-header">
        <span id="listLabel">Contenuto</span>
        <span id="cacheBadge"></span>
      </div>
      <div id="list"></div>
    </div>
  </div>
</div>

<!-- UPLOAD PANEL -->
<div id="upPanel"></div>

<!-- PREVIEW OVERLAY -->
<div class="overlay" id="overlay">
  <div class="preview-win">
    <div class="preview-nav">
      <span class="preview-title" id="ovT"></span>
      <button class="btn-close" onclick="closePre()">✕ Chiudi</button>
    </div>
    <div class="preview-body" id="ovB"><span class="preview-loader">Caricamento...</span></div>
  </div>
</div>

<!-- MODALS -->
<div class="modal-bg" id="folderM">
  <div class="modal">
    <h3>📁 Nuova Cartella</h3>
    <input type="text" id="fnm" placeholder="Nome cartella"/>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeM('folderM')">Annulla</button>
      <button class="btn-primary" onclick="confF()">Crea</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="renM">
  <div class="modal">
    <h3>✎ Rinomina</h3>
    <input type="text" id="rnm"/>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeM('renM')">Annulla</button>
      <button class="btn-primary" onclick="confR()">Salva</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="movM">
  <div class="modal">
    <h3>⬈ Sposta in...</h3>
    <select id="mtar"></select>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeM('movM')">Annulla</button>
      <button class="btn-primary" onclick="confM()">Sposta</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="confirmM">
  <div class="modal">
    <h3 id="confTitle">Conferma</h3>
    <p class="conf-text" id="confText"></p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeM('confirmM')">Annulla</button>
      <button class="btn-primary" id="confBtn" style="background:var(--red)">Elimina</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const API_URL = 'https://script.google.com/macros/s/AKfycby86wtDv4qoydhij5ihYibgRYmX5OdvDjHiAWRjMj0iA47dOhCtgN-N8nwOGzUNr1s/exec';
const CHUNK   = 1024 * 1024;

// ============================================================
// CACHE — invalidazione selettiva
// ============================================================
const cache = {
  _store: {},          // { folderId: { data, ts } }
  _folders: null,      // getAllFolders cache
  TTL: 5 * 60 * 1000, // 5 minuti max per sicurezza

  get(id) {
    const key = id || '__root__';
    const entry = this._store[key];
    if (!entry) return null;
    if (Date.now() - entry.ts > this.TTL) { delete this._store[key]; return null; }
    return entry.data;
  },
  set(id, data) {
    this._store[id || '__root__'] = { data, ts: Date.now() };
  },
  invalidate(id) {
    delete this._store[id || '__root__'];
  },
  invalidateAll() {
    this._store = {};
    this._folders = null;
  },
  setFolders(data) { this._folders = data; },
  getFolders()     { return this._folders; }
};

// ============================================================
// STATO
// ============================================================
let curId = null;
let renI  = { id: null, isF: false };
let movId = null;

// ============================================================
// API
// ============================================================
async function api(params) {
  const url = new URL(API_URL);
  Object.keys(params).forEach(k => url.searchParams.set(k, params[k]));
  const res = await fetch(url.toString(), { redirect: 'follow' });
  return res.json();
}

async function apiPost(body) {
  const form = new URLSearchParams();
  form.append('postData', JSON.stringify(body));
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: form,
    redirect: 'follow'
  });
  return res.json();
}

// ============================================================
// LOGIN / LOGOUT
// ============================================================
async function login() {
  const pwd = document.getElementById('pwd').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginErr');
  err.style.display = 'none';
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Accesso...';
  try {
    const data = await api({ action: 'checkPassword', pwd });
    if (data.ok) {
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('mainPage').classList.add('active');
      document.getElementById('topbar').style.display = 'flex';
      loadF(null);
    } else {
      err.style.display = 'block';
    }
  } catch(e) {
    err.textContent = 'Errore di connessione.';
    err.style.display = 'block';
  }
  btn.disabled = false;
  btn.innerHTML = 'Accedi';
}

function logout() { location.reload(); }

// ============================================================
// CARICAMENTO CARTELLA — con cache selettiva
// ============================================================
async function loadF(id, forceRefresh = false) {
  curId = id;

  // Mostra subito da cache se disponibile
  const cached = !forceRefresh && cache.get(id);
  if (cached) {
    render(cached);
    renderBreadcrumb(cached.path);
    showCacheBadge(true);
    return;
  }

  showCacheBadge(false);
  document.getElementById('list').innerHTML = '<p style="padding:36px;text-align:center;color:var(--gray-4);font-size:14px">Caricamento...</p>';

  try {
    // Una sola chiamata invece di due (ottimizzazione backend)
    const data = await api({ action: 'getFolderData', folderId: id || '' });
    cache.set(id, data);
    render(data);
    renderBreadcrumb(data.path);
    showCacheBadge(false);
  } catch(e) {
    document.getElementById('list').innerHTML = '<p style="padding:36px;text-align:center;color:var(--red)">Errore di caricamento. Riprova.</p>';
  }
}

function refreshCurrent() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  cache.invalidate(curId);
  cache._folders = null;
  loadF(curId, true).finally(() => {
    setTimeout(() => btn.classList.remove('spinning'), 400);
  });
}

function showCacheBadge(fromCache) {
  const badge = document.getElementById('cacheBadge');
  badge.innerHTML = fromCache ? '<span class="cache-badge">⚡ Cache</span>' : '';
}

// ============================================================
// RENDER
// ============================================================
function renderBreadcrumb(path) {
  const bc = document.getElementById('bc');
  bc.innerHTML = (path || []).map((p, i) =>
    `<span class="bc-item" onclick="loadF('${p.id}')">${p.name}</span>${i < path.length - 1 ? '<span class="bc-sep">›</span>' : ''}`
  ).join('');
}

function render(data) {
  const folders = data.folders || [];
  const files   = data.files   || [];
  const count   = folders.length + files.length;
  document.getElementById('listLabel').textContent = `${count} element${count !== 1 ? 'i' : 'o'}`;

  if (!count) {
    document.getElementById('list').innerHTML = '<div class="empty-state"><div>📭</div>Cartella vuota</div>';
    return;
  }

  let h = folders.map(f => `
    <div class="row folder-row" id="row-${f.id}" onclick="loadF('${f.id}')">
      <div class="row-icon">📁</div>
      <div class="row-info"><div class="row-name">${esc(f.name)}</div></div>
      <div class="row-actions">
        <button class="act" onclick="event.stopPropagation();showR('${f.id}',true,'${escQ(f.name)}')">✎<span class="act-label">Rinomina</span></button>
        <button class="act" onclick="event.stopPropagation();delI('${f.id}',true)">🗑️<span class="act-label">Elimina</span></button>
      </div>
    </div>`).join('');

  h += files.map(f => `
    <div class="row" id="row-${f.id}">
      <div class="row-icon">${fileIcon(f.mime)}</div>
      <div class="row-info">
        <div class="row-name">${esc(f.name)}</div>
        <div class="row-meta">${f.size}</div>
      </div>
      <div class="row-actions">
        <button class="act" onclick="pre('${f.id}','${escQ(f.name)}','${f.mime}')">👁️<span class="act-label">Anteprima</span></button>
        <button class="act" onclick="showR('${f.id}',false,'${escQ(f.name)}')">✎<span class="act-label">Rinomina</span></button>
        <button class="act" onclick="showMv('${f.id}')">⬈<span class="act-label">Sposta</span></button>
        <button class="act" onclick="dl('${f.id}')">↓<span class="act-label">Scarica</span></button>
        <button class="act" onclick="delI('${f.id}',false)">🗑️<span class="act-label">Elimina</span></button>
      </div>
    </div>`).join('');

  document.getElementById('list').innerHTML = h;
}

function fileIcon(mime) {
  if (!mime) return '📄';
  if (mime.startsWith('image/'))       return '🖼️';
  if (mime.startsWith('video/'))       return '🎬';
  if (mime.startsWith('audio/'))       return '🎵';
  if (mime.includes('pdf'))            return '📕';
  if (mime.includes('spreadsheet') || mime.includes('excel')) return '📊';
  if (mime.includes('presentation') || mime.includes('powerpoint')) return '📊';
  if (mime.includes('document') || mime.includes('word')) return '📝';
  if (mime.includes('zip') || mime.includes('archive')) return '🗜️';
  return '📄';
}

function esc(s)  { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function escQ(s) { return (s || '').replace(/'/g, '&#39;').replace(/"/g, '&quot;'); }

// ============================================================
// OPERAZIONI CON UI OTTIMISTICA
// ============================================================

// Rinomina — aggiorna subito la UI, poi sincronizza server
function showR(id, isF, name) {
  renI = { id, isF };
  document.getElementById('rnm').value = name;
  showM('renM');
}
async function confR() {
  const newName = document.getElementById('rnm').value.trim();
  if (!newName) return;
  closeM('renM');

  // Aggiorna subito UI
  const row = document.getElementById('row-' + renI.id);
  if (row) row.querySelector('.row-name').textContent = newName;

  // Invalida cache e sincronizza
  cache.invalidate(curId);
  await apiPost({ action: 'renameItem', id: renI.id, isFolder: renI.isF, name: newName });
}

// Sposta
async function showMv(id) {
  movId = id;
  showM('movM');
  // Usa cache per getAllFolders
  let folders = cache.getFolders();
  if (!folders) {
    document.getElementById('mtar').innerHTML = '<option>Caricamento...</option>';
    const data = await api({ action: 'getAllFolders' });
    folders = data.folders || [];
    cache.setFolders(folders);
  }
  document.getElementById('mtar').innerHTML = folders.map(f =>
    `<option value="${f.id}">${esc(f.name)}</option>`
  ).join('');
}
async function confM() {
  const targetId = document.getElementById('mtar').value;
  closeM('movM');
  // Ottimistico: rimuovi riga
  const row = document.getElementById('row-' + movId);
  if (row) row.classList.add('removing');
  cache.invalidate(curId);
  await apiPost({ action: 'moveFile', fileId: movId, targetId });
  setTimeout(() => loadF(curId, true), 300);
}

// Crea cartella — ottimistica
async function confF() {
  const name = document.getElementById('fnm').value.trim();
  if (!name) return;
  closeM('folderM');

  // Aggiungi subito alla lista con ID temporaneo
  const tmpId = 'tmp-' + Date.now();
  const list = document.getElementById('list');
  const tmpRow = document.createElement('div');
  tmpRow.className = 'row folder-row optimistic';
  tmpRow.id = 'row-' + tmpId;
  tmpRow.innerHTML = `<div class="row-icon">📁</div><div class="row-info"><div class="row-name">${esc(name)}</div></div>`;
  list.insertAdjacentElement('afterbegin', tmpRow);

  cache.invalidate(curId);
  await apiPost({ action: 'createFolder', name, parentId: curId || '' });
  loadF(curId, true); // refresh vero dopo creazione
}

// Elimina — con UI ottimistica post-conferma
async function delI(id, isFolder) {
  const title = isFolder ? 'Elimina Cartella' : 'Elimina File';
  let text = isFolder ? 'Sei sicuro di voler eliminare questa cartella?' : 'Sei sicuro di voler eliminare questo file?';

  if (isFolder) {
    const check = await apiPost({ action: 'checkFolderContent', id });
    if (!check.ok) return alert('Errore: ' + check.error);
    if (!check.isEmpty) {
      text = 'ATTENZIONE! La cartella NON è vuota.\n\nContiene:\n──────────────────\n' + check.list + '\n──────────────────\n\nVuoi eliminare tutto?';
    }
  }

  document.getElementById('confTitle').textContent = title;
  document.getElementById('confText').textContent  = text;
  document.getElementById('confBtn').onclick = async () => {
    closeM('confirmM');
    // Ottimistico: animazione rimozione
    const row = document.getElementById('row-' + id);
    if (row) row.classList.add('removing');
    cache.invalidate(curId);
    const res = await apiPost({ action: 'deleteItem', id, isFolder });
    if (!res.ok) { alert('Errore: ' + res.error); loadF(curId, true); }
    else setTimeout(() => loadF(curId), 300);
  };
  showM('confirmM');
}

// ============================================================
// PREVIEW & DOWNLOAD
// ============================================================
async function dl(id) {
  const data = await api({ action: 'getDownloadUrl', fileId: id });
  window.open(data.url, '_blank');
}

async function pre(id, name, mime) {
  document.getElementById('ovT').textContent  = name;
  document.getElementById('ovB').innerHTML    = '<span class="preview-loader">⏳ Caricamento anteprima...</span>';
  document.getElementById('overlay').classList.add('active');
  try {
    const data = await api({ action: 'getPreviewUrl', fileId: id, mime });
    if (data.url.startsWith('data:')) {
      document.getElementById('ovB').innerHTML = mime.startsWith('image/')
        ? `<img src="${data.url}" alt="${name}">`
        : `<iframe src="${data.url}"></iframe>`;
    } else {
      window.open(data.url, '_blank');
      closePre();
    }
  } catch(e) { closePre(); }
}

function closePre() { document.getElementById('overlay').classList.remove('active'); }

// ============================================================
// UPLOAD (invariato — già ottimale per Apps Script)
// ============================================================
function handleFiles(fs) { [...fs].forEach(up); }
function onDrop(e) {
  e.preventDefault();
  document.getElementById('dz').classList.remove('drag');
  handleFiles(e.dataTransfer.files);
}

function up(file) {
  const uid = 'u' + Date.now() + Math.random().toString(36).slice(2);
  document.getElementById('upPanel').insertAdjacentHTML('beforeend', `
    <div id="${uid}" class="up-card">
      <div class="up-filename">${esc(file.name)}</div>
      <div class="up-status"><span id="${uid}s">Avvio...</span><b id="${uid}p">0%</b></div>
      <div class="up-bar"><div id="${uid}f" class="up-fill"></div></div>
    </div>`);

  const tot = Math.ceil(file.size / CHUNK) || 1;
  let idx = 0, fId = null;

  async function send() {
    const slice = file.slice(idx * CHUNK, (idx + 1) * CHUNK);
    const b64   = await toBase64(slice);
    const res   = await apiPost({ action: 'uploadChunk', name: file.name, mime: file.type, data: b64, chunkIndex: idx, totalChunks: tot, fileId: fId, folderId: curId || '' });
    fId = res.fileId;
    idx++;
    const pct = Math.round((idx / tot) * 100);
    document.getElementById(uid + 'p').textContent = pct + '%';
    document.getElementById(uid + 'f').style.width  = pct + '%';
    document.getElementById(uid + 's').textContent  = `Chunk ${idx}/${tot}`;
    if (idx < tot) { await send(); }
    else {
      document.getElementById(uid + 's').textContent = '✅ Completato';
      cache.invalidate(curId); // invalida cache cartella corrente
      setTimeout(() => { document.getElementById(uid)?.remove(); loadF(curId); }, 1500);
    }
  }
  send().catch(() => {
    document.getElementById(uid + 's').textContent = '❌ Errore';
  });
}

function toBase64(blob) {
  return new Promise(res => {
    const r = new FileReader();
    r.onload = e => res(e.target.result.split(',')[1]);
    r.readAsDataURL(blob);
  });
}

// ============================================================
// MODALS
// ============================================================
function showM(id) { document.getElementById(id).classList.add('active'); }
function closeM(id) { document.getElementById(id).classList.remove('active'); }

// Chiudi modal cliccando fuori
document.querySelectorAll('.modal-bg').forEach(bg => {
  bg.addEventListener('click', e => { if (e.target === bg) bg.classList.remove('active'); });
});
</script>
